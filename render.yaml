services:
  - type: web
    name: guaihack-global-brief-gen
    env: python
    plan: free # spins down after ~15 min idle; first request then takes up to a minute — the frontend communicates this honestly
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      # Comma-separated browser origins allowed by CORS. The Vercel rewrite
      # proxy makes production traffic same-origin, so this is a backup layer.
      # Set to the real Vercel URL after the first deploy.
      - key: ALLOWED_ORIGINS
        value: "https://atlas-brief.vercel.app,http://localhost:5173"
      # Without an Anthropic key the API returns 503 instead of fabricated
      # keyword-matched "analysis". Set true only for keyless demos.
      - key: DEMO_MODE
        value: "false"
      - key: RATE_LIMIT_PER_MINUTE
        value: "6"
      - key: GDELT_MIN_INTERVAL_SECONDS
        value: "5.5"
      - key: MAX_ARTICLES_PER_SOURCE
        value: "15"
      - key: DEDUP_SIMILARITY_THRESHOLD
        value: "0.85"
      # Validated against the labeled fixture in backend/tests (recall 0.92 /
      # precision 0.92) — no longer a hackathon guess.
      - key: RELEVANCE_SIMILARITY_THRESHOLD
        value: "0.30"
      - key: HOURS_LOOKBACK
        value: "24"
      - key: SYNTHESIS_MODEL
        value: "claude-haiku-4-5"
      - key: CONTEXT_MODEL
        value: "claude-haiku-4-5"
      - key: CACHE_TTL_MINUTES
        value: "15"
      - key: CONTEXT_ENRICHMENT_LIMIT
        value: "4"
